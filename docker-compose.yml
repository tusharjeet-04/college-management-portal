services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/college_portal
      JWT_SECRET: ${JWT_SECRET:-please_change_this_in_production_0123456789}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:8080
    ports:
      - '5000:5000'

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: ''
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - '8080:80'

volumes:
  mongo_data:
