name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint server
        run: npm run lint --workspace server

      - name: Lint client
        run: npm run lint --workspace client

      - name: Build client
        run: npm run build --workspace client
